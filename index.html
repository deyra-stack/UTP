*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Manrope',sans-serif;background:var(--sand);color:var(--ink);overflow:hidden;}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--panel-w);background:var(--ink);display:flex;flex-direction:column;z-index:1000;box-shadow:4px 0 24px rgba(0,0,0,.35);}

#sidebar-header .subtitle{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5;}
#counter-bar{padding:12px 24px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;display:flex;align-items:center;gap:8px;}
#counter-bar .count{font-size:28px;font-family:'Rubik',sans-serif;color:var(--gold);line-height:1;}
#counter-bar .count-label{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4;}
#search-wrap{padding:14px 24px 0;flex-shrink:0;}

#search-input::placeholder{color:rgba(255,255,255,.3);}
#search-input:focus{border-color:var(--gold);}
#filters-title{padding:16px 24px 8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);flex-shrink:0;}
#filters{flex:1;overflow-y:auto;padding:0 16px 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.filter-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;background:transparent;border:none;cursor:pointer;border-radius:6px;text-align:left;transition:background .15s;margin-bottom:2px;}
.filter-btn:hover{background:rgba(255,141,244,.08);}
.filter-btn.active{background:rgba(77,223,184,.12);border-left:2px solid #4ddfb8;}
.filter-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.15);}
.filter-label{font-size:12.5px;color:rgba(255,255,255,.75);flex:1;line-height:1.3;}
.filter-count{font-size:11px;color:rgba(255,255,255,.3);font-weight:700;}
#show-all-btn{margin:8px 16px 0;width:calc(100% - 32px);padding:9px;border:1px solid rgba(255,255,255,.15);background:transparent;border-radius:6px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;transition:all .2s;flex-shrink:0;}
#show-all-btn:hover{background:rgba(77,223,184,.1);color:#4ddfb8;}
#sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;}
#sidebar-footer p{font-size:10px;color:rgba(255,255,255,.25);line-height:1.6;}
#map{position:fixed;left:var(--panel-w);top:0;right:0;bottom:0;z-index:1;}
#detail{position:fixed;left:var(--panel-w);bottom:0;width:calc(100% - var(--panel-w));background:var(--ink);border-top:3px solid var(--gold);padding:22px 28px;z-index:999;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:240px;}
#detail.open{transform:translateY(0);}
#detail-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.08);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
#detail-close:hover{background:rgba(255,255,255,.18);}
#detail-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
#detail-name{font-family:'Rubik',sans-serif;font-size:22px;color:#fff;margin-bottom:4px;}
#detail-addr{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:10px;}
#detail-meta{display:flex;gap:20px;flex-wrap:wrap;}
.detail-item{font-size:12px;color:rgba(255,255,255,.6);}
.detail-item strong{color:#fff;}
#detail-maps-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;background:var(--gold);color:#3d3d5d;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;transition:opacity .2s;white-space:nowrap;}
#detail-maps-link:hover{opacity:.85;}
.custom-marker{width:30px;height:30px;border-radius:50% 50% 50% 4px;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer;}
.leaflet-popup-content-wrapper{background:var(--ink);color:#fff;border-radius:8px;border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.leaflet-popup-tip{background:var(--ink);}
.leaflet-popup-content{margin:12px 16px;font-family:'Manrope',sans-serif;}
.leaflet-control-attribution{background:rgba(255,252,245,.9)!important;color:rgba(61,61,93,.6)!important;}
.leaflet-control-zoom a{background:#fff!important;color:#3d3d5d!important;border-color:rgba(61,61,93,.2)!important;}
@media(max-width:720px){:root{--panel-w:100%;}#sidebar{bottom:auto;height:auto;max-height:55vh;}#map{left:0;top:55vh;}#detail{left:0;}}

Object.entries(CAT).forEach(([cat,cfg])=>{
  const btn=document.createElement("button");
  btn.className="filter-btn active";btn.dataset.cat=cat;
  btn.innerHTML=`<span class="filter-dot" style="background:${cfg.color}"></span><span class="filter-label">${cfg.emoji} ${cat}</span><span class="filter-count">${catCounts[cat]||0}</span>`;
  btn.addEventListener("click",()=>{
    if(activeFilters.has(cat)){activeFilters.delete(cat);btn.classList.remove("active");}
    else{activeFilters.add(cat);btn.classList.add("active");}
    applyFilters();
  });
  filtersEl.appendChild(btn);
});

  m.on("click",()=>showDetail(p,m));
  m.addTo(map);
  markers.push({marker:m,data:p});
});
ETNO.forEach(p=>{
  const icon=L.divIcon({
    html:`<div style="width:30px;height:30px;border-radius:50%;background:#595959;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;"><span style="font-size:13px;line-height:1;">📌</span></div>`,
    className:"",iconSize:[30,30],iconAnchor:[15,15]
  });
  const m=L.marker([p.lat,p.lng],{icon});
  m.on("click",()=>{
    const cfg=CAT["Etnografía"];
    document.getElementById("detail-cat").style.color=cfg.color;
    document.getElementById("detail-cat").textContent="📌 Etnografía";
    document.getElementById("detail-name").textContent=p.name;
    document.getElementById("detail-addr").textContent=p.addr;
    document.getElementById("detail-meta").innerHTML=`<span class="detail-item">${p.note}</span>`;
    document.getElementById("detail-maps-link").href=p.pid?"https://www.google.com/maps/place/?q=place_id:"+p.pid:"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(p.name+", "+p.addr);
    document.getElementById("detail").classList.add("open");
    map.panTo([p.lat,p.lng],{animate:true,duration:0.5});
  });
  m.addTo(map);
  markers.push({marker:m,data:p});
});
function applyFilters(){
  const q=document.getElementById("search-input").value.toLowerCase();
  let count=0;
  markers.forEach(({marker,data})=>{
    const visible=activeFilters.has(data.cat)&&(!q||data.name.toLowerCase().includes(q)||data.addr.toLowerCase().includes(q));
    if(visible){marker.addTo(map);count++;}else marker.remove();
  });
  document.getElementById("visible-count").textContent=count;
}
document.getElementById("search-input").addEventListener("input",()=>applyFilters());
function showDetail(p,markerObj){
  const cfg=CAT[p.cat]||{color:"#999"};
  document.getElementById("detail-cat").style.color=cfg.color;
  document.getElementById("detail-cat").textContent=(cfg.emoji||"")+" "+p.cat;
  document.getElementById("detail-name").textContent=p.name;
  document.getElementById("detail-addr").textContent=p.addr;
  const stars=p.rating!=="—"?"⭐ "+p.rating:"";
  const rev=p.reviews!=="—"?"("+Number(p.reviews).toLocaleString()+" resenas)":"";
  const tel=p.phone!=="—"?"📞 "+p.phone:"";
  const hrs="🕐 "+p.hours;
  document.getElementById("detail-meta").innerHTML=[stars+" "+rev,tel,hrs].filter(Boolean).map(s=>`<span class="detail-item">${s}</span>`).join("");
  document.getElementById("detail-maps-link").href="https://www.google.com/maps/place/?q=place_id:"+p.pid;
  document.getElementById("detail").classList.add("open");
  map.panTo([p.lat,p.lng],{animate:true,duration:0.5});
}
document.getElementById("detail-close").addEventListener("click",()=>document.getElementById("detail").classList.remove("open"));
map.on("click",()=>document.getElementById("detail").classList.remove("open"));
</script>
